<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo el mundo sale del agua</title>
<style>
/* ============================================================
   BASE
   Paleta extraída de imagen referencia: estero litoral argentino
   Pixel art 1990s arcade style
============================================================ */
:root{
  /* Imagen ref: cielo gris-azulado perlado */
  --cielo-alto: #8aa0a8;
  --cielo-nube: #c8d8d8;
  --cielo-bajo: #6a8878;
  /* Agua: verde-gris oscuro profundo */
  --agua-sup:   #2e3e32;
  --agua-mid:   #243028;
  --agua-prof:  #141e18;
  /* Tierra / ribera: marrón cálido con lodo */
  --tierra:     #4a3820;
  --lodo:       #3a2e18;
  --hierba:     #3a5228;
  --hierba2:    #2a4020;
  /* Vegetación: verdes profundos litoral */
  --veg1:       #2a4a20;  /* árboles fondo */
  --veg2:       #3a5a28;  /* copas */
  --veg3:       #1a3018;  /* sombras vegetación */
  --totora:     #1a1e10;  /* totoras/espadañas oscuras */
  --totora-cab: #3a2818;  /* cabezas de totora */
  --camalote:   #3a6020;  /* lirios flotantes */
  --camalote2:  #4a7828;  /* lirios claros */
  --alga:       #1e4a1e;
  --alga2:      #2a6228;
  /* HUD */
  --hud-txt:    #90b898;
  --hud-dim:    #3a5840;
  --hud-dark:   #0a1810;
}

*{margin:0;padding:0;box-sizing:border-box}
body{background:#141e18;overflow:hidden;font-family:'Courier New',monospace;cursor:none;user-select:none}
canvas{display:block;position:fixed;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}

/* ── CURSOR ── */
#cursor{position:fixed;width:6px;height:6px;background:rgba(144,184,120,.75);
  pointer-events:none;z-index:300;transform:translate(-50%,-50%)}

/* ============================================================
   PANTALLA INICIO
============================================================ */
#inicio{
  position:fixed;inset:0;z-index:200;
  background:linear-gradient(180deg,#0e181a 0%,#141e18 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 2s ease;
}
#inicio.oculto{opacity:0;pointer-events:none}
#inicio h1{
  font-size:clamp(1.2rem,3vw,2.2rem);color:var(--hud-txt);
  letter-spacing:.18em;text-transform:uppercase;text-align:center;
  line-height:1.5;margin-bottom:.8rem;
  text-shadow:2px 2px 0 #1a3a20,4px 4px 0 #0a1a10;
}
#inicio h1 small{display:block;font-size:.35em;color:var(--hud-dim);letter-spacing:.32em;margin-top:.5rem}
#inicio p{color:var(--hud-dim);font-size:clamp(.66rem,1.3vw,.82rem);text-align:center;
  max-width:380px;line-height:2.1;margin-bottom:2.2rem;letter-spacing:.04em}
#btn-iniciar{
  background:#0a1c12;border:2px solid #2a5838;color:#70a880;
  padding:.65em 2em;font-family:inherit;font-size:.76rem;
  letter-spacing:.22em;text-transform:uppercase;cursor:pointer;transition:all .2s;
}
#btn-iniciar:hover{background:#162a1c;border-color:#80b890;color:#b0d8c0}

/* ============================================================
   HUD
============================================================ */
#hud-etapa{position:fixed;top:12px;left:12px;z-index:50;pointer-events:none}
#etapa-label{font-size:.48rem;color:var(--hud-dim);letter-spacing:.22em;text-transform:uppercase;margin-bottom:1px}
#etapa-nombre{font-size:.76rem;color:var(--hud-txt);letter-spacing:.12em;text-transform:uppercase;
  text-shadow:1px 1px 0 #081008}
#progreso-wrap{margin-top:4px;display:flex;align-items:center;gap:5px;opacity:0;transition:opacity 1s}
#progreso-wrap.visible{opacity:1}
#prog-label{font-size:.44rem;color:var(--hud-dim);letter-spacing:.16em;text-transform:uppercase}
#prog-track{width:68px;height:4px;background:var(--hud-dark);border:1px solid #1a2820}
#prog-fill{height:100%;width:0%;background:#3a8050;transition:width .5s ease,background 1.5s}

#hud-humedad{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  z-index:50;pointer-events:none;display:flex;align-items:center;gap:6px;
  opacity:0;transition:opacity 1.5s;
}
#hud-humedad.visible{opacity:1}
#hum-label{font-size:.48rem;color:var(--hud-dim);letter-spacing:.18em;text-transform:uppercase}
#hum-track{width:86px;height:5px;background:var(--hud-dark);border:1px solid #1a2820}
#hum-fill{height:100%;width:100%;background:#4a9858;transition:width .7s ease,background 1.2s}

#hud-temp{position:fixed;top:12px;right:12px;z-index:50;pointer-events:none;
  font-size:.48rem;color:var(--hud-dim);letter-spacing:.15em;text-transform:uppercase;text-align:right}

/* ── BARRA DE ECOSISTEMA (nueva, abajo izquierda) ── */
#hud-eco{
  position:fixed;bottom:12px;left:12px;z-index:50;pointer-events:none;
  display:flex;align-items:center;gap:6px;opacity:0;transition:opacity 1.5s;
}
#hud-eco.visible{opacity:1}
#eco-label{font-size:.48rem;color:var(--hud-dim);letter-spacing:.18em;text-transform:uppercase}
#eco-track{width:100px;height:6px;background:var(--hud-dark);border:1px solid #1a2820}
#eco-fill{
  height:100%;width:100%;
  background:linear-gradient(to right,#2a6838,#4ab860);
  transition:width .8s ease,background 1.5s;
}

#hud-controles{position:fixed;bottom:12px;right:12px;z-index:50;pointer-events:none;
  text-align:right;line-height:2.1}
.ctrl-linea{font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;transition:color .5s}
.ctrl-ok{color:rgba(120,185,140,.58)}
.ctrl-no{color:rgba(50,80,60,.2);text-decoration:line-through}

/* ── FASE DE ALIMENTACIÓN (overlay sutil, no bloquea el juego) ── */
#fase-alim{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:55;pointer-events:none;
  font-size:.58rem;color:rgba(140,210,110,.7);letter-spacing:.22em;
  text-transform:uppercase;text-align:center;
  text-shadow:0 0 12px rgba(0,0,0,.9);
  opacity:0;transition:opacity 1s ease;
}
#fase-alim.visible{opacity:1}

#mensaje{
  position:fixed;bottom:9vh;left:50%;transform:translateX(-50%);
  z-index:50;pointer-events:none;color:#a8c8b0;
  font-size:clamp(.63rem,1.5vw,.86rem);text-align:center;
  max-width:500px;line-height:1.95;letter-spacing:.04em;font-style:italic;
  text-shadow:0 0 10px #000,0 0 24px #000;padding:0 1.4rem;
  transition:opacity 1.1s ease;
}
#mensaje.oculto{opacity:0}

/* ============================================================
   SISTEMA DE PREGUNTAS
   Aparece sobre el juego, pausa la acción
============================================================ */
#pregunta-overlay{
  position:fixed;inset:0;z-index:160;
  background:rgba(8,20,14,.88);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .6s ease;
}
#pregunta-overlay.activo{opacity:1;pointer-events:all}

#pregunta-card{
  max-width:520px;width:90%;
  border:2px solid #2a4a30;
  background:#0a1810;
  padding:2rem 2.2rem;
  position:relative;
}
/* Esquinas pixel */
#pregunta-card::before,#pregunta-card::after{
  content:'';position:absolute;width:8px;height:8px;
  background:#3a6040;
}
#pregunta-card::before{top:-2px;left:-2px}
#pregunta-card::after{bottom:-2px;right:-2px}

#preg-contexto{
  font-size:.6rem;color:#4a7858;letter-spacing:.18em;text-transform:uppercase;
  margin-bottom:.8rem;line-height:1.6;font-style:italic;
}
#preg-texto{
  font-size:clamp(.78rem,1.8vw,1rem);color:#90c8a0;
  letter-spacing:.06em;line-height:1.7;margin-bottom:1.4rem;
}
.preg-opcion{
  display:flex;align-items:flex-start;gap:.7rem;
  margin-bottom:.65rem;padding:.5rem .7rem;
  border:1px solid #1a3020;cursor:pointer;
  transition:background .15s,border-color .15s;
  font-size:.72rem;color:#6a9878;letter-spacing:.06em;line-height:1.5;
}
.preg-opcion:hover,.preg-opcion.hover{background:#0e2018;border-color:#3a6040;color:#90c8a0}
.preg-opcion .preg-key{
  font-size:.62rem;color:#3a6040;min-width:18px;
  border:1px solid #2a4030;padding:0 4px;text-align:center;flex-shrink:0;margin-top:1px;
}
#preg-instruccion{
  margin-top:1rem;font-size:.48rem;color:#2a4830;
  letter-spacing:.2em;text-transform:uppercase;text-align:center;
}

/* ============================================================
   FLASH METAMORFOSIS
============================================================ */
#flash{position:fixed;inset:0;z-index:190;pointer-events:none;
  background:#a0e8b8;opacity:0;transition:opacity .1s ease}
/* Flash negativo (respuesta incorrecta) */
#flash-neg{position:fixed;inset:0;z-index:190;pointer-events:none;
  background:#301808;opacity:0;transition:opacity .1s ease}

/* OVERLAY CONTAMINACIÓN */
#overlay-cont{
  position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;transition:opacity 3s ease;
  background:radial-gradient(ellipse at 50% 55%,transparent 18%,rgba(80,60,8,.55) 100%);
}

/* LLUVIA */
#lluvia{position:fixed;inset:0;z-index:45;pointer-events:none;opacity:0;transition:opacity 1.4s ease}
.gota{position:absolute;width:1px;background:linear-gradient(to bottom,transparent,rgba(110,180,200,.4));animation:caer linear infinite}
@keyframes caer{from{transform:translateY(-70px)}to{transform:translateY(110vh)}}

/* PANTALLA TRANSICIÓN ETAPA */
#pantalla-trans{
  position:fixed;inset:0;z-index:175;pointer-events:none;
  background:#0a1410;opacity:0;transition:opacity .45s ease;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;
}
#pantalla-trans.activo{opacity:1;pointer-events:all}
#trans-titulo{color:#78ba88;font-size:clamp(.7rem,1.8vw,1rem);letter-spacing:.3em;text-transform:uppercase;
  text-shadow:0 0 18px rgba(90,190,120,.35)}
#trans-texto{color:#4a7858;font-size:clamp(.55rem,1.4vw,.78rem);letter-spacing:.18em;
  text-transform:uppercase;text-align:center;max-width:440px;line-height:2}
</style>
</head>
<body>

<div id="cursor"></div>

<!-- ── INICIO ── -->
<div id="inicio">
  <h1>Todo el mundo sale del agua<small>Ciclo de vida · litoral argentino</small></h1>
  <p>Comenzás como huevo en la quietud de la charca.<br>
     No hay meta. No hay victoria. Solo el ciclo.</p>
  <button id="btn-iniciar">▶ Entrar al ciclo</button>
</div>

<!-- ── FLASH ── -->
<div id="flash"></div>
<div id="flash-neg"></div>

<!-- ── TRANSICIÓN ETAPA ── -->
<div id="pantalla-trans">
  <div id="trans-titulo"></div>
  <div id="trans-texto"></div>
</div>

<!-- ── PREGUNTA OVERLAY ── -->
<div id="pregunta-overlay">
  <div id="pregunta-card">
    <div id="preg-contexto"></div>
    <div id="preg-texto"></div>
    <div id="preg-opciones"></div>
    <div id="preg-instruccion">1 · 2 · 3 para responder</div>
  </div>
</div>

<!-- ── HUD ── -->
<div id="hud-etapa">
  <div id="etapa-label">Etapa de vida</div>
  <div id="etapa-nombre">Huevo</div>
  <div id="progreso-wrap">
    <span id="prog-label">Metamorfosis</span>
    <div id="prog-track"><div id="prog-fill"></div></div>
  </div>
</div>
<div id="hud-humedad">
  <span id="hum-label">Piel</span>
  <div id="hum-track"><div id="hum-fill"></div></div>
</div>
<div id="hud-temp"><span id="temp-txt">Temp · templada</span></div>
<div id="hud-controles"></div>
<!-- ── BARRA DE ECOSISTEMA (nueva) ── -->
<div id="hud-eco">
  <span id="eco-label">Ecosistema</span>
  <div id="eco-track"><div id="eco-fill"></div></div>
</div>
<!-- ── AVISO FASE ALIMENTACIÓN ── -->
<div id="fase-alim">¡Recolectá el alimento!</div>
<div id="mensaje" class="oculto"></div>
<div id="overlay-cont"></div>
<div id="lluvia"></div>

<canvas id="canvas"></canvas>

<script>
'use strict';
/* ============================================================
   TODO EL MUNDO SALE DEL AGUA
   Fuentes: narrativa base + ciclo de vida + preguntas del documento
   Estética: imagen referencia estero litoral argentino (pixel art 90s)
============================================================ */

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const $ = id => document.getElementById(id);
const mensajeEl    = $('mensaje');
const etapaNomEl   = $('etapa-nombre');
const progFillEl   = $('prog-fill');
const progWrapEl   = $('progreso-wrap');
const humFillEl    = $('hum-fill');
const humHudEl     = $('hud-humedad');
const tempTxtEl    = $('temp-txt');
const contrlsEl    = $('hud-controles');
const flashEl      = $('flash');
const flashNegEl   = $('flash-neg');
const overlayEl    = $('overlay-cont');
const lluviaEl     = $('lluvia');
const panTransEl   = $('pantalla-trans');
const transTitEl   = $('trans-titulo');
const transTextoEl = $('trans-texto');
const pregOverEl   = $('pregunta-overlay');
const pregCtxEl    = $('preg-contexto');
const pregTextoEl  = $('preg-texto');
const pregOpcsEl   = $('preg-opciones');
const cursorEl     = $('cursor');
// ── NUEVOS ──
const ecoFillEl    = $('eco-fill');   // barra de ecosistema
const ecoHudEl     = $('hud-eco');    // contenedor barra eco
const faseAlimEl   = $('fase-alim'); // aviso fase alimentación

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

/* ============================================================
   PALETA — extraída de imagen referencia
   Estero litoral: agua verde-gris oscura, totoras negras,
   lirios, cielo gris-azulado perlado, tierra marrón cálida
============================================================ */
const PAL = {
  // Cielo
  cieloAlto: '#7a9aa8',   // gris-azulado perlado (imagen ref)
  cieloNube: '#b8ccd0',   // nubes claras
  cieloBajo: '#5a7868',   // hacia el horizonte verdoso

  // Agua — verde oscuro, casi negro en profundidad
  aguaSup:   '#2e3e32',
  aguaMid:   '#202e24',
  aguaProf:  '#101810',
  aguaRef:   'rgba(80,120,90,.18)',  // reflejos superficie

  // Ribera / suelo
  tierra:    '#4a3820',
  lodo:      '#3a2e18',
  lodo2:     '#2e2414',
  hierba:    '#3a5228',
  hierba2:   '#2e4020',

  // Vegetación fondo (árboles, arbusto litoral)
  arbolTronco: '#3a2818',
  arbolCopa1:  '#2a4820',
  arbolCopa2:  '#3a5828',
  arbolCopa3:  '#1e3818',

  // Totoras / espadañas (negras con cabeza marrón)
  totora:    '#1a1e10',
  totoraCab: '#3a2818',
  totoraHoj: '#222a14',

  // Camalotes / lirios acuáticos (verde brillante)
  camalote1: '#3a6020',
  camalote2: '#4e7828',
  camalote3: '#2a4a18',
  lirio:     '#d8e0a8',  // flor amarillo-blancuzca

  // Algas subacuáticas
  alga1:     '#1e4220',
  alga2:     '#2a5828',
  alga3:     '#163218',

  // Tronco caído en agua (marrón verdoso)
  tronco:    '#3a2c18',
  troncoMus: '#2a3a18',

  // Organismos
  ranaVerde:  '#4a7830',
  ranaClaras: '#5e9040',
  ranaOjo:    '#1a1000',

  // Contaminación
  contamH:   'rgba(80,70,20,.55)',
};

/* ============================================================
   BANCO DE PREGUNTAS — 5 preguntas (una por etapa)
   Basadas SOLO en el documento de preguntas proporcionado
============================================================ */
const PREGUNTAS = [
  // ETAPA 0: HUEVO
  {
    etapa: 0,
    contexto: "La masa gelatinosa de huevos se balancea en el agua mientras el sol calienta el estanque.",
    pregunta: "¿Qué característica fundamental tienen los huevos de los anfibios?",
    opciones: [
      "Poseen una cáscara dura protectora.",
      "Son blandos, gelatinosos y absorben agua del medio.",
      "Tienen plumas para mantenerse calientes.",
    ],
    correcta: 1,  // índice 0-based → opción B
    efectoOk:  () => { W.vitalidad = Math.min(1, W.vitalidad + .25); W.contam = Math.max(0, W.contam - .1); },
    efectoMal: () => { W.contam += .15; },
    msgOk:  "Los huevos brillan. La humedad los sostiene. El embrión crece.",
    msgMal: "El nivel de humedad cae. El agua retrocede. La sequía avanza.",
  },
  // ETAPA 1: RENACUAJO
  {
    etapa: 1,
    contexto: "Explorás el fondo del estanque en busca de energía.",
    pregunta: "¿De qué se alimentan principalmente los renacuajos?",
    opciones: [
      "Insectos y mariposas.",
      "Algas, plantas acuáticas y materia orgánica en descomposición.",
      "Únicamente de peces pequeños.",
    ],
    correcta: 1,
    efectoOk:  () => { W.vitalidad = Math.min(1, W.vitalidad + .2); W.algasBrillo = 1.4; },
    efectoMal: () => { O.humedad = Math.max(.1, O.humedad - .3); },
    msgOk:  "Raspás las algas con tus dientes de queratina. La energía fluye. La cola se fortalece.",
    msgMal: "Perdés energía. La cola se mueve con menos fuerza.",
  },
  // ETAPA 2: TRANSICIÓN
  {
    etapa: 2,
    contexto: "Tu cuerpo cambia. Las patas traseras aparecen, pero aún tenés cola.",
    pregunta: "¿Qué ocurre en el sistema respiratorio durante esta transformación?",
    opciones: [
      "Las branquias crecen para absorber más agua.",
      "Desaparecen las branquias y se desarrollan pulmones y piel permeable.",
      "Se deja de respirar por completo durante un tiempo.",
    ],
    correcta: 1,
    efectoOk:  () => { W.vitalidad = Math.min(1, W.vitalidad + .2); },
    efectoMal: () => { O.malformacion = Math.min(1, O.malformacion + .4); W.contam += .12; },
    msgOk:  "La metamorfosis avanza. Podés explorar la orilla por primera vez.",
    msgMal: "El personaje queda atrapado en el agua. Las patas se forman torcidas.",
  },
  // ETAPA 3: JUVENIL
  {
    etapa: 3,
    contexto: "Estás en la orilla. El calor aprieta y tu piel empieza a sentirse tirante.",
    pregunta: "¿Cómo absorben agua los anfibios terrestres?",
    opciones: [
      "Beben por la boca como los humanos.",
      "La absorben a través de su piel fina y permeable.",
      "No necesitan beber agua nunca.",
    ],
    correcta: 1,
    efectoOk:  () => { O.humedad = Math.min(1, O.humedad + .4); W.vitalidad = Math.min(1, W.vitalidad + .15); },
    efectoMal: () => { O.humedad = Math.max(.05, O.humedad - .35); },
    msgOk:  "Tu piel absorbe la humedad del musgo. El medidor se llena. El ciclo continúa.",
    msgMal: "La humedad cae peligrosamente. La pantalla se vuelve más seca.",
  },
  // ETAPA 4: ADULTA
  {
    etapa: 4,
    contexto: "Es una noche lluviosa. Escuchás un coro de sonidos potentes en el estero.",
    pregunta: "¿Para qué utilizan los machos su canto durante la época reproductiva?",
    opciones: [
      "Para asustar a los humanos.",
      "Como elemento para el reconocimiento de parejas de su misma especie.",
      "Para avisar que hay comida cerca.",
    ],
    correcta: 1,
    efectoOk:  () => { W.vitalidad = Math.min(1, W.vitalidad + .25); W.coroCanto = 1; activarLluvia(); },
    efectoMal: () => { W.silencioEco = 1; },
    msgOk:  "Tu canto atrae otras voces. El ecosistema sonoro revive. La red sigue viva.",
    msgMal: "El ambiente se vuelve silencioso. Una señal de ecosistema en riesgo.",
  },
];

/* ============================================================
   ETAPAS DE VIDA — definición completa
============================================================ */
const ETAPAS = [
  { id:0, nombre:'Huevo',               dur:14, aguaPct:.66,
    ctrl:[{t:'← → arriba abajo',ok:false},{t:'salto',ok:false},{t:'nado',ok:false},{t:'C canto',ok:false}],
    msg:["Blandos, gelatinosos. Absorben el agua del medio a través de la membrana.",
         "365 millones de años de este mismo comienzo.",
         "El embrión se desarrolla. La humedad es tu único alimento."],
    trans:null },
  { id:1, nombre:'Renacuajo',            dur:30, aguaPct:.61,
    ctrl:[{t:'← → ↑ ↓ nadar',ok:true},{t:'salto',ok:false},{t:'C canto',ok:false}],
    msg:["Tus branquias filtran el oxígeno disuelto. Respirás el agua.",
         "Tus dientes de queratina raspan las algas. Sos herbívoro, por ahora.",
         "La cola ondula. El agua cede. Sos fluido."],
    trans:"Tu cola se forma.\nEl agua es tu mundo entero." },
  { id:2, nombre:'Renacuajo con patas',  dur:22, aguaPct:.55,
    ctrl:[{t:'← → nadar / caminar',ok:true},{t:'↑ nadar arriba',ok:true},{t:'↑↑ salir del agua',ok:true},{t:'↓ bucear',ok:true},{t:'C canto',ok:false}],
    msg:["Las patas emergen. El mundo cambia de forma.",

/* ============================================================
   NIVEL DEL AGUA (interpolado suavemente)
============================================================ */
function calcNA(){ return W.h*ETAPAS[W.etapaIdx].aguaPct + W.contam*W.h*.025; }
function na(){ return W.nivelAguaAct; }

/* ============================================================
   INICIALIZAR ECOSISTEMA
============================================================ */
function inicializar(){
  resize();

  // ── NUEVO: el mundo es 3× el ancho de pantalla ──
  W.mundoAncho = W.w * 3;
  W.camX = 0;

  W.nivelAguaAct=W.nivelAguaTgt=calcNA();
  const n=na();

  // Posición inicial del organismo (en coordenadas de mundo)
  O.x=W.mundoAncho*.18; O.y=n+W.h*.12; O.enAgua=true; O.tam=4;

  // Olas
  W.olas=Array.from({length:6},()=>({
    off:Math.random()*Math.PI*2, vel:.22+Math.random()*.3, amp:4+Math.random()*6
  }));

  // Nubes (coordenadas de mundo)
  W.nubes=Array.from({length:12},(_,i)=>({
    x:(i/12)*W.mundoAncho+Math.random()*200,
    y:W.h*.04+Math.random()*W.h*.12,
    vel:8+Math.random()*12, ancho:60+Math.random()*80, alto:18+Math.random()*14,
  }));

  // Árboles distribuidos en el mundo completo
  const nArb=Math.floor(W.mundoAncho/70);
  W.arboles=Array.from({length:nArb},(_,i)=>({
    x:Math.floor((i/nArb)*W.mundoAncho+28+Math.sin(i*1.8)*12),
    altT: Math.floor((.15+Math.sin(i*2.2)*.06)*W.h),
    r1:   18+Math.floor(Math.sin(i*1.4)*6),
    r2:   14+Math.floor(Math.cos(i*1.9)*5),
    tipo: i%3,
  }));

  // Troncos caídos (varios en el mundo)
  W.troncos=[
    {x:W.mundoAncho*.25, largo:W.w*.18, grosor:5},
    {x:W.mundoAncho*.55, largo:W.w*.14, grosor:4},
    {x:W.mundoAncho*.82, largo:W.w*.16, grosor:5},
  ];

  // Totoras / juncos (mundo completo)
  W.juncos=Array.from({length:90},(_,i)=>({
    x:(i/90)*W.mundoAncho*1.05-W.mundoAncho*.02+Math.random()*20,
    h:42+Math.random()*58, fase:Math.random()*Math.PI*2,
    g:1+Math.floor(Math.random()*2), esTotora:Math.random()>.55,
  }));

  // Algas (mundo completo)
  W.algas=Array.from({length:70},(_,i)=>({
    x:(i/70)*W.mundoAncho*1.05-W.mundoAncho*.02+(Math.random()-.5)*20,
    yBase:n+14+Math.random()*72, h:18+Math.random()*42,
    fase:Math.random()*Math.PI*2, contam:false, segs:3+Math.floor(Math.random()*3),
  }));

  // Camalotes (mundo completo)
  W.camalotes=Array.from({length:30},(_,i)=>({
    x:(i/30)*W.mundoAncho+Math.random()*80, y:n-3,
    vel:(Math.random()-.5)*10, r:12+Math.random()*14,
    tieneFlor:Math.random()>.5,
  }));

  // Peces (mundo completo)
  W.peces=Array.from({length:6},()=>({
    x:Math.random()*W.mundoAncho, y:n+42+Math.random()*80,
    vel:(Math.random()>.5?1:-1)*(35+Math.random()*22),
  }));

  // ── NUEVO: SÍMBOLOS DE PREGUNTA en el mundo ──────────────────
  // Uno por etapa, distribuidos progresivamente en el mapa
  // La rana los toca para activar la pregunta
  W.simbolos = [
    { etapa:0, x:W.mundoAncho*.12, recogido:false, pulso:0 },
    { etapa:1, x:W.mundoAncho*.28, recogido:false, pulso:0 },
    { etapa:2, x:W.mundoAncho*.48, recogido:false, pulso:0 },
    { etapa:3, x:W.mundoAncho*.68, recogido:false, pulso:0 },
    { etapa:4, x:W.mundoAncho*.88, recogido:false, pulso:0 },
  ];

  W.alimentos=[]; W.faseAlimentacion=false;
  W.insectos=[];

  humHudEl.classList.add('visible');
  ecoHudEl.classList.add('visible');
  actualizarHUD();
  actualizarBarraEco();
}

/* ============================================================
   SISTEMA DE PREGUNTAS
   NUEVO: se activa cuando la rana toca el símbolo correspondiente
   a su etapa actual. Solo una vez por etapa.
============================================================ */
function chequearSimbolos(){
  if(W.preguntaActiva||W.enTransicion||W.faseAlimentacion) return;
  W.simbolos.forEach(s=>{
    if(s.recogido) return;
    if(s.etapa!==W.etapaIdx) return;
    // Colisión con el símbolo (en coordenadas de mundo)
    const dx=Math.abs(O.x - s.x);
    const n=na();
    // El símbolo flota sobre la superficie del agua o tierra
    const sy = O.enAgua ? n - 25 : n - 30;
    const dy=Math.abs(O.y - sy);
    if(dx<28 && dy<40){
      s.recogido=true;
      mostrarPregunta(PREGUNTAS[W.etapaIdx]);
    }
  });
}

}

function mostrarPregunta(p){
  W.preguntaActiva=true;
  pregCtxEl.textContent=p.contexto;
  pregTextoEl.textContent=p.pregunta;
  pregOpcsEl.innerHTML=p.opciones.map((o,i)=>`
    <div class="preg-opcion" data-idx="${i}">
      <span class="preg-key">${i+1}</span>${o}
    </div>`).join('');

  // Hover con mouse
  pregOpcsEl.querySelectorAll('.preg-opcion').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      pregOpcsEl.querySelectorAll('.preg-opcion').forEach(e=>e.classList.remove('hover'));
      el.classList.add('hover');
    });
    el.addEventListener('click',()=>responder(parseInt(el.dataset.idx)));
  });

  pregOverEl.classList.add('activo');
}

function responder(idx){
  if(!W.preguntaActiva) return;
  const p=PREGUNTAS[W.etapaIdx];
  W.preguntaRespondida[W.etapaIdx]=true;
  pregOverEl.classList.remove('activo');
  W.preguntaActiva=false;

  setTimeout(()=>{
    if(idx===p.correcta){
      // ── CORRECTO ──────────────────────────────────────────────
      flashEl.style.opacity='.5';
      setTimeout(()=>{ flashEl.style.opacity='0'; },250);
      p.efectoOk();
      // Sube ecosistema
      W.ecosistema=Math.min(1,W.ecosistema+.18);
      actualizarBarraEco();
      mostrarMensaje(p.msgOk,5000);

      // ── NUEVO: iniciar fase de alimentación ──
      setTimeout(()=>iniciarFaseAlimentacion(),1200);

    } else {
      // ── INCORRECTO ────────────────────────────────────────────
      flashNegEl.style.opacity='.4';
      setTimeout(()=>{ flashNegEl.style.opacity='0'; },350);
      p.efectoMal();
      // Baja ecosistema
      W.ecosistema=Math.max(0,W.ecosistema-.15);
      actualizarBarraEco();
      mostrarMensaje(p.msgMal,6000);
      // No hay fase de alimentación
    }
  },300);
}

/* ── NUEVA: Actualizar la barra de ecosistema en el DOM ── */
function actualizarBarraEco(){
  const pct=Math.round(W.ecosistema*100);
  ecoFillEl.style.width=pct+'%';

  ecoFillEl.style.background=W.ecosistema>.6

    :W.ecosistema>.3
    ?'linear-gradient(to right,#7a6820,#c8a828)'
    :'linear-gradient(to right,#6a1808,#c03020)';
}

// Respuesta por teclado 1/2/3
document.addEventListener('keydown',e=>{
  if(!W.preguntaActiva) return;
  const mapa={'1':0,'2':1,'3':2,'a':0,'b':1,'c':2,'A':0,'B':1,'C':2};
  if(mapa[e.key]!==undefined) responder(mapa[e.key]);
});

/* ============================================================
   FASE DE ALIMENTACIÓN (NUEVA)
   Post-respuesta correcta: aparecen alimentos flotando cerca
   de la rana. La rana los recolecta moviéndose hacia ellos.
   Los tipos dependen de la etapa:
   - renacuajo: algas (círculos verdes)
   - adulta:    insectos (puntos ámbar)
   - general:   gotas de agua (azul)
============================================================ */
function iniciarFaseAlimentacion(){
  if(W.faseAlimentacion) return;
  W.faseAlimentacion=true;
  W.alimentosTiempo=0;
  W.alimentosRecogidos=0;

  // Tipo de alimento según etapa
  const tipo = W.etapaIdx<=1 ? 'alga'
             : W.etapaIdx>=4 ? 'insecto'
             : 'gota';

  // Spawnear 5 alimentos dispersos alrededor de la rana
  const cant=5;
  W.alimentosMax=cant;
  W.alimentos=[];
  const n=na();
  for(let i=0;i<cant;i++){
    const angulo=(i/cant)*Math.PI*2;
    const dist=80+Math.random()*60;
    // Los alimentos aparecen en el mismo medio que la rana (agua o tierra)
    const baseY = O.enAgua ? n+30+Math.random()*50 : n-20-Math.random()*40;
    W.alimentos.push({
      x: O.x + Math.cos(angulo)*dist,
      y: baseY,
      tipo,
      recogido:false,
      vida:1,
      pulso:Math.random()*Math.PI*2,
    });
  }

  // Mostrar aviso
  faseAlimEl.classList.add('visible');
  mostrarMensaje('¡Recolectá el alimento disponible en el entorno!',4000);
}

function actualizarAlimentos(dt){
  if(!W.faseAlimentacion) return;
  W.alimentosTiempo+=dt;

  // Mantener alimentos dentro del mundo
  W.alimentos.forEach(a=>{
    if(a.recogido) return;
    a.pulso+=dt*3;
    // Limitar X al mundo
    a.x=Math.max(O.tam*2,Math.min(W.mundoAncho-O.tam*2,a.x));
    // Colisión con organismo
    if(Math.abs(a.x-O.x)<22&&Math.abs(a.y-O.y)<22){
      a.recogido=true;
      W.alimentosRecogidos++;
      // Efecto visual de recolección
      for(let i=0;i<5;i++) crearP(a.x,a.y,a.tipo==='alga'?'cola':a.tipo==='insecto'?'canto':'burbuja');
      // Sube ecosistema levemente con cada recolección
      W.ecosistema=Math.min(1,W.ecosistema+.04);
      actualizarBarraEco();
    }
  });

  // Terminar fase si todos recogidos o pasaron 12 segundos
  const todos=W.alimentos.every(a=>a.recogido);
  if(todos||W.alimentosTiempo>12){
    W.faseAlimentacion=false;
    W.alimentos=[];
    faseAlimEl.classList.remove('visible');
    if(todos) mostrarMensaje('¡Bien alimentada! El ecosistema se fortalece.',4000);
  }
}

function actualizarProgresion(dt){
  if(W.etapaIdx>=4||W.enTransicion||W.preguntaActiva) return;
  const fC=1-W.contam*.65, fT=.35+W.tempAmb*.65;
  W.tiempoEnEtapa+=dt*fC*fT;
  W.progreso=Math.min(1,W.tiempoEnEtapa/ETAPAS[W.etapaIdx].dur);
  if(W.progreso>=1) avanzarEtapa();
  if(W.etapaIdx<4) progFillEl.style.width=Math.round(W.progreso*100)+'%';
}

/* ============================================================
   FÍSICA POR ETAPA
============================================================ */
function fisicaHuevo(){
  const n=na();
  // El huevo flota en su posición inicial de mundo (no el centro de pantalla)
  // O.x ya está fijado en inicializar en W.mundoAncho*.18
  O.y=n-5+Math.sin(W.t*.52)*3;
  O.enAgua=true; O.enSuelo=false; O.vx=0; O.vy=0;
  if(Math.random()<.04) crearP(O.x+(Math.random()-.5)*16,O.y+8,'burbuja');
}

function fisicaRenacuajo(dt){
  const n=na(), V=112, am=.89;
  if(keys['ArrowLeft'] ||keys['a']){O.vx-=V*dt*8;O.dir=-1;}
  if(keys['ArrowRight']||keys['d']){O.vx+=V*dt*8;O.dir= 1;}
  if(keys['ArrowUp']   ||keys['w']) O.vy-=V*dt*8;
  if(keys['ArrowDown'] ||keys['s']) O.vy+=V*dt*8;
  O.vx*=am; O.vy*=am;
  O.vx=Math.max(-V,Math.min(V,O.vx)); O.vy=Math.max(-V,Math.min(V,O.vy));
  O.x+=O.vx*dt; O.y+=O.vy*dt;
  O.x=Math.max(O.tam,Math.min(W.mundoAncho-O.tam,O.x));
  if(O.y<n+O.tam) O.y=n+O.tam;
  if(O.y>W.h-O.tam) O.y=W.h-O.tam;
  O.enAgua=true; O.enSuelo=false;
  if(Math.random()<.16) crearP(O.x-O.dir*O.tam,O.y+Math.sin(W.t*7)*4,'cola');
}

function fisicaTransicion(dt){
  const n=na(), VH=128,VV=102,am=.87,G=520;
  const enAg=O.y>n;
  if(enAg){
    if(keys['ArrowLeft']||keys['a']){O.vx-=VH*dt*7;O.dir=-1;}
    if(keys['ArrowRight']||keys['d']){O.vx+=VH*dt*7;O.dir=1;}
    O.vx*=am; O.vx=Math.max(-VH,Math.min(VH,O.vx));
    if(keyOnce['ArrowUp']||keyOnce['w']){
      const ah=W.t;
      if(ah-O.ultimoUp<.34){ O.vy=-320; mostrarMensaje("Las patas te impulsan fuera del agua.",4500); }
      else O.vy=-VV;
      O.ultimoUp=ah;
    }
    if(keys['ArrowDown']||keys['s']) O.vy+=VV*dt*7;
    O.vy*=am; O.vy=Math.max(-VV*1.8,Math.min(VV*1.5,O.vy));
  } else {
    if(keys['ArrowLeft']||keys['a']){O.vx=-VH*.6;O.dir=-1;}
    else if(keys['ArrowRight']||keys['d']){O.vx=VH*.6;O.dir=1;}
    else O.vx*=.75;
    // ── NUEVO: doble-↓ para zambullirse desde tierra ──
    if(keyOnce['ArrowDown']||keyOnce['s']){
      const ahora=W.t;
      const cercaDelAgua=O.y>=(n-O.tam*2.5);
      if(ahora-O.ultimoDown<.32&&cercaDelAgua){
        O.y=n+O.tam; O.vy=60; O.enAgua=true; O.enSuelo=false;
        mostrarMensaje("El agua te recibe.",2500);
      }
      O.ultimoDown=ahora;
    }
    O.vy+=G*dt;
  }
  O.x+=O.vx*dt; O.y+=O.vy*dt;
  O.x=Math.max(O.tam,Math.min(W.mundoAncho-O.tam,O.x));
  const piso=n-O.tam*.5;
  if(!enAg&&O.y>=piso){O.y=piso;O.vy=0;O.enSuelo=true;} else O.enSuelo=false;
  if(O.y>W.h-O.tam){O.y=W.h-O.tam;O.vy=0;}
  O.enAgua=O.y>n;
  if(Math.random()<.1) crearP(O.x-O.dir*O.tam*.8,O.y+3,'cola');
}

function fisicaRana(dt, esAdulta){
  const n=na(), hum=O.humedad;
  const VH=hum>.3?(esAdulta?190:152):80, G=700;
  if(O.estivacion){
    O.y=n-O.tam*.4; O.vx=0; O.vy=0; O.enSuelo=true; O.enAgua=false;
    if(keys['ArrowLeft']||keys['a']||keys['ArrowRight']||keys['d']||
       keys['ArrowUp']||keys['w']||keys[' ']) O.estivacion=false;
    return;
  }
  const enAg=O.y>n;
  if(enAg){
    if(keys['ArrowLeft']||keys['a']){O.vx=-VH;O.dir=-1;}
    else if(keys['ArrowRight']||keys['d']){O.vx=VH;O.dir=1;}
    else O.vx*=.85;
    if(keyOnce['ArrowUp']||keyOnce['w']){
      const ah=W.t;
      if(ah-O.ultimoUp<.30){O.vy=-470;O.vx=O.dir*Math.max(Math.abs(O.vx),88);mostrarMensaje("Tu salto te lleva a la orilla.",3500);}
      else O.vy=-130;
      O.ultimoUp=ah;
    }
    if(keys['ArrowDown']||keys['s']) O.vy+=142*dt;
    if(!keys['ArrowDown']&&!keys['s']) O.vy+=(-36-O.vy)*dt*2;
    O.x+=O.vx*dt; O.y+=O.vy*dt;
    O.x=Math.max(O.tam,Math.min(W.mundoAncho-O.tam,O.x));
    if(O.y<n-O.tam*.35) O.enAgua=false;
    else{ O.enAgua=true; if(O.y>W.h-O.tam){O.y=W.h-O.tam;O.vy=0;} O.enSuelo=false; O.saltando=false; }
  } else {
    if(keys['ArrowLeft']||keys['a']){O.vx=-VH;O.dir=-1;}
    else if(keys['ArrowRight']||keys['d']){O.vx=VH;O.dir=1;}
    else O.vx*=.80;
    if((keys['ArrowUp']||keys['w']||keys[' '])&&O.enSuelo&&!O.saltando){O.vy=-442;O.saltando=true;O.enSuelo=false;}

    // ── NUEVO: doble-↓ para sumergirse desde tierra si está cerca del agua ──
    if(keyOnce['ArrowDown']||keyOnce['s']){
      const ahora=W.t;
      const cercaDelAgua=O.y>=(n-O.tam*2.5); // dentro de ~2 tamaños del borde
      if(ahora-O.ultimoDown<.32&&cercaDelAgua){
        // Doble ↓: zambullido al agua
        O.y=n+O.tam;     // depositar dentro del agua suavemente
        O.vy=60;         // impulso leve hacia abajo
        O.enAgua=true; O.enSuelo=false; O.saltando=false;
        mostrarMensaje("Tu piel siente el agua de nuevo.",3000);
      }
      O.ultimoDown=ahora;
    }

    O.vy+=G*dt; O.x+=O.vx*dt; O.y+=O.vy*dt;
    O.x=Math.max(O.tam,Math.min(W.mundoAncho-O.tam,O.x));
    const piso=n-O.tam*.5;
    if(O.y>n+O.tam*.3){O.enAgua=true;O.enSuelo=false;O.saltando=false;O.vy*=.28;}
    else if(O.y>=piso){O.y=piso;O.vy=0;O.enSuelo=true;O.enAgua=false;O.saltando=false;}
    else{O.enSuelo=false;O.enAgua=false;}
    if(O.y>W.h-O.tam){O.y=W.h-O.tam;O.vy=0;}
  }
}

function moverOrganismo(dt){
  if(W.enTransicion||W.preguntaActiva) return;
  switch(W.etapaIdx){
    case 0: fisicaHuevo();         break;
    case 1: fisicaRenacuajo(dt);   break;
    case 2: fisicaTransicion(dt);  break;
    case 3: fisicaRana(dt,false);  break;
    case 4: fisicaRana(dt,true);   break;
  }
}

/* ============================================================
   SISTEMAS AMBIENTALES
============================================================ */
function actualizarNivelAgua(dt){
  W.nivelAguaTgt=calcNA();
  W.nivelAguaAct+=(W.nivelAguaTgt-W.nivelAguaAct)*Math.min(1,dt*.38);
}

function actualizarHidratacion(dt){
  if(W.etapaIdx<=1){ O.humedad=Math.min(1,O.humedad+dt*.3); return; }
  if(O.enAgua){ O.humedad=Math.min(1,O.humedad+dt*.18*(1-W.contam*.55)); }
  else{
    const b=W.etapaIdx===4?.018:.012;
    O.humedad=Math.max(.05,O.humedad-dt*b*(1+W.contam*2.5));
    if(W.lluvia) O.humedad=Math.min(1,O.humedad+dt*.09);
  }
  humFillEl.style.width=Math.round(O.humedad*100)+'%';
  humFillEl.style.background=O.humedad>.55?'#4a9858':O.humedad>.28?'#989020':'#983020';
}

function actualizarTemperatura(){
  W.tempAmb=Math.max(0,Math.min(1,.5+Math.sin(W.t*.022)*.42+W.contam*.2));
  $('temp-txt').textContent=W.tempAmb<.3?'Temp · frío':W.tempAmb>.7?'Temp · calor':'Temp · templada';
}

function actualizarMalformacion(dt){
  if(W.contam>.55){ O.malformacion=Math.min(1,O.malformacion+dt*.04); }
  else O.malformacion=Math.max(0,O.malformacion-dt*.015);
}

function actualizarPeces(dt){
  if(W.etapaIdx>2) return;
  W.peces.forEach(p=>{
    p.x+=p.vel*dt;
    if(p.x<-50) p.x=W.mundoAncho+50; if(p.x>W.mundoAncho+50) p.x=-50;
    if(Math.abs(p.x-O.x)<130&&Math.abs(p.y-O.y)<60){
      p.vel=Math.sign(O.x-p.x)*Math.min(Math.abs(p.vel)*1.5,90);
      if(Math.abs(p.x-O.x)<30) mostrarMensaje("Un pez carnívoro se acerca. Tu única defensa es la velocidad.",3500);
    }
  });
}

function actualizarInsectos(dt){
  const n=na();
  if(W.etapaIdx>=4&&W.contam>.35&&Math.random()<.02){
    // spawnear insectos alrededor de la rana en el mundo
    W.insectos.push({x:O.x+(Math.random()-.5)*200,y:n-18-Math.random()*80,vx:(Math.random()-.5)*55,vida:1,r:2+Math.random()*2});
  }
  if(!W.insectos) W.insectos=[];
  W.insectos=W.insectos.filter(ins=>{
    ins.x+=ins.vx*dt; ins.y+=Math.sin(W.t*4+ins.x*.05)*.7; ins.vida-=.0016;
    if(W.etapaIdx>=4&&Math.abs(ins.x-O.x)<52&&Math.abs(ins.y-O.y)<38){ ins.vida-=.07; crearP(ins.x,ins.y,'canto'); }
    return ins.vida>0&&ins.x>-20&&ins.x<W.mundoAncho+20;
  });
}

function actualizarCamalotes(dt){
  const n=na();
  W.camalotes.forEach(c=>{
    c.x+=c.vel*dt; c.y=n-3;
    if(c.x<-c.r*2) c.x=W.mundoAncho+c.r;
    if(c.x>W.mundoAncho+c.r*2) c.x=-c.r;
  });
}

function actualizarNubes(dt){
  W.nubes.forEach(c=>{ c.x+=c.vel*dt; if(c.x>W.mundoAncho+100) c.x=-c.ancho; });
}

function actualizarAlgas(){
  W.algas.forEach(a=>{ a.contam=W.contam>.42; if(a.contam&&a.h<80)a.h+=.06; else if(!a.contam&&a.h>20)a.h-=.04; });
}

// Efecto vitalidad (resp. correcta → entorno más vivo)
function actualizarVitalidad(dt){
  W.vitalidad=Math.max(0,Math.min(1,W.vitalidad+(W.contam<.5?.005:-.002)));
  if(W.algasBrillo>1) W.algasBrillo=Math.max(1,W.algasBrillo-dt*.3);
  if(W.coroCanto>0){ W.coroCanto=Math.max(0,W.coroCanto-dt*.2); if(Math.random()<.15) W.ondas.push({x:Math.random()*W.w,y:na()-20-Math.random()*40,r:4,alpha:.5}); }
  if(W.silencioEco>0) W.silencioEco=Math.max(0,W.silencioEco-dt*.1);
}

/* ============================================================
   LLUVIA
============================================================ */
function crearLluvia(){
  lluviaEl.innerHTML='';
  for(let i=0;i<55;i++){
    const g=document.createElement('div'); g.className='gota';
    const h=28+Math.random()*55;
    g.style.cssText=`left:${Math.random()*100}%;height:${h}px;animation-duration:${.4+Math.random()*.68}s;animation-delay:${Math.random()*.8}s;opacity:${.26+Math.random()*.38};`;
    lluviaEl.appendChild(g);
  }
}
function activarLluvia(){
  if(W.lluvia) return;
  W.lluvia=true; W.lluviaDur=0; crearLluvia(); lluviaEl.style.opacity='1';
  mostrarMensaje("La lluvia despierta tu actividad. Tu piel bebe.",5000);
}
function actualizarLluvia(dt){ if(!W.lluvia)return; W.lluviaDur+=dt; if(W.lluviaDur>9){W.lluvia=false;lluviaEl.style.opacity='0';} }

/* ============================================================
   PARTÍCULAS
============================================================ */
function crearP(x,y,tipo){
  const C={burbuja:[88,185,195],canto:[132,210,98],cola:[75,158,118],contam:[148,125,38]};
  const c=C[tipo]||[200,200,200];
  W.particulas.push({x,y,vx:(Math.random()-.5)*(tipo==='canto'?40:20),vy:-24-Math.random()*24,r:tipo==='burbuja'?2+Math.random()*2:1+Math.random()*1.5,vida:1,dec:.022+Math.random()*.02,cr:c[0],cg:c[1],cb:c[2]});
}

/* ============================================================
   CANTO (solo adulta)
============================================================ */
function emitirCanto(){
  if(W.etapaIdx<4||W.preguntaActiva) return;
  O.cantando=true;
  for(let i=0;i<5;i++) setTimeout(()=>W.ondas.push({x:O.x,y:O.y-8,r:4,alpha:.76}),i*175);
  for(let i=0;i<10;i++) crearP(O.x,O.y-10,'canto');
  setTimeout(()=>{ O.cantando=false; },1400);
  mostrarMensaje(W.contam<.35?"Tu canto confirma que la red sigue viva.":"Tu canto se pierde en el ruido del cemento.",5000);
}

/* ============================================================
   TECLAS ESPECIALES
============================================================ */
document.addEventListener('keydown',e=>{
  if(W.preguntaActiva) return;
  if(e.key==='c'||e.key==='C') emitirCanto();
  if(e.key==='r'||e.key==='R') activarLluvia();
  if((e.key==='e'||e.key==='E')&&W.etapaIdx>=3&&!O.enAgua&&W.contam>.2){
    O.estivacion=true; mostrarMensaje("Estivación. Tu cuerpo espera en el lodo a que el agua regrese.",7000);
  }
  if(e.key==='+'||e.key==='='){W.contam=Math.min(1,W.contam+.12);if(W.contam>.5)mostrarMensaje("El cemento avanza. El agua escasea.",4500);}
  if(e.key==='l'||e.key==='L'){W.contam=Math.max(0,W.contam-.15);mostrarMensaje("El agua vuelve a fluir limpia.",4500);}
});
canvas.addEventListener('click',emitirCanto);

/* ============================================================
   EVENTOS AUTOMÁTICOS
============================================================ */
let tUltEvento=0;
function eventosAuto(){
  const INT=38; if(W.t-tUltEvento<INT)return; tUltEvento=W.t;
  const ev=Math.floor(W.t/INT)%5;
  if(ev===0) activarLluvia();
  else if(ev===1){W.contam=Math.min(1,W.contam+.1);mostrarMensaje("Los agroquímicos llegan al agua. Tu piel lo detecta.",5500);}
  else if(ev===2){W.contam=Math.max(0,W.contam-.07);mostrarMensaje("El agua se aclara. El ecosistema respira.",5000);}
  else if(ev===3&&W.etapaIdx>=4) emitirCanto();
}

/* ============================================================
   ACTUALIZAR
============================================================ */
function actualizar(dt){
  if(!W.enTransicion&&!W.preguntaActiva) W.t+=dt;
  moverOrganismo(dt);

  // ── NUEVO: CÁMARA — seguir a la rana horizontalmente ─────────
  // La cámara centra la rana horizontalmente con suavizado
  const camTarget = O.x - W.w*.42;  // rana al 42% izq de pantalla
  // Limitar cámara al mundo
  const camMax = W.mundoAncho - W.w;
  W.camX += (Math.max(0,Math.min(camMax,camTarget)) - W.camX) * Math.min(1,dt*6);

  actualizarNivelAgua(dt);
  if(!W.preguntaActiva){
    actualizarProgresion(dt);
    intentarPregunta();       // stub (no hace nada, compatibilidad)
    chequearSimbolos();       // ── NUEVO: detección de símbolos
  }
  actualizarHidratacion(dt);
  actualizarTemperatura();
  actualizarMalformacion(dt);
  actualizarPeces(dt);
  actualizarInsectos(dt);
  actualizarCamalotes(dt);
  actualizarNubes(dt);
  actualizarAlgas();
  actualizarVitalidad(dt);
  actualizarLluvia(dt);
  actualizarAlimentos(dt);   // ── NUEVO: fase de alimentación

  // ── NUEVO: ecosistema deriva lentamente hacia equilibrio ─────
  // La contaminación lo baja; sin eventos, se recupera muy lento
  const derivaEco = W.contam>.5 ? -.003 : .001;
  W.ecosistema = Math.max(0,Math.min(1,W.ecosistema+derivaEco*dt));
  actualizarBarraEco();

  eventosAuto();
  mensajeAuto();

  W.particulas=W.particulas.filter(p=>{ p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=13*dt;p.vida-=p.dec;return p.vida>0; });
  W.ondas=W.ondas.filter(o=>{ o.r+=42*dt;o.alpha-=dt*.84;return o.alpha>0; });
  overlayEl.style.opacity=W.contam*.58;
  if(O.humedad<.18&&W.etapaIdx>=3) mostrarMensaje(W.contam>.5?"El agua amarga no nutre tu piel.":"Tu piel se seca. El agua está cerca.",3500);
  limpiarKO();
}

/* ============================================================
   DIBUJO — PIXEL ART
   Paleta fiel a imagen referencia: estero litoral argentino
============================================================ */

// ── Cielo con nubes pixel ────────────────────────────────────
function dibCielo(t){
  const n=na(), w=W.mundoAncho;  // mundo completo para el scroll
  const v=Math.max(0,1-W.contam*.6);
  const gC=ctx.createLinearGradient(0,0,0,n);
  gC.addColorStop(0, lerpColor('#5a7080','#2a2010',1-v));
  gC.addColorStop(.5, lerpColor('#7a9098','#4a3818',1-v));
  gC.addColorStop(1,  lerpColor('#6a8878','#3a2e10',1-v));
  ctx.fillStyle=gC; ctx.fillRect(0,0,w,n);

  // Nubes pixel (imagen: blancas achatadas)
  if(W.contam<.7){
    const ca=v*.55;
    W.nubes.forEach(c=>{
      const cx=Math.floor(c.x), cy=Math.floor(c.y), cw=c.ancho, ch=c.alto;
      // Cuerpo principal nube
      ctx.fillStyle=`rgba(195,215,215,${ca*.8})`;
      ctx.fillRect(cx,cy+ch*.3,cw,ch*.7);
      ctx.fillRect(cx+cw*.1,cy,cw*.8,ch);
      // Detalle pixel (bordes claros)
      ctx.fillStyle=`rgba(215,228,228,${ca*.6})`;
      ctx.fillRect(cx+2,cy+1,cw-4,2); ctx.fillRect(cx+4,cy,cw-8,2);
      // Sombra base nube
      ctx.fillStyle=`rgba(140,168,175,${ca*.35})`;
      ctx.fillRect(cx+2,cy+ch-2,cw-4,3);
    });
  }
}

// ── Árboles fondo (silueta densa como imagen) ────────────────
function dibArboles(t){
  const n=na();
  const v=W.vitalidad;
  W.arboles.forEach(a=>{
    const bx=a.x, alt=a.altT, bal=Math.sin(t*.3+a.x*.02)*2;
    // Tronco marrón cálido
    ctx.fillStyle='#3a2818';
    ctx.fillRect(bx-2,n-Math.floor(alt*.3),4,Math.floor(alt*.3));

    // Copas (imagen: formas redondeadas, múltiples capas)
    const c1=lerpColor('#2a4820','#2a2808',1-v);
    const c2=lerpColor('#3a5828','#383010',1-v);
    const c3=lerpColor('#1e3818','#1e1a08',1-v);

    [[alt,a.r1+6,'#1e3018'],[alt*.78,a.r1,c1],[alt*.55,a.r2,c2]].forEach(([ah,r,col])=>{
      ctx.fillStyle=col;
      for(let py=-r;py<=r*0.6;py++) for(let px=-r;px<=r;px++){
        if(px*px*1.2+py*py<=r*r){
          ctx.fillRect(Math.floor(bx+px+bal),Math.floor(n-ah-py),1,1);
        }
      }
    });
    // Highlight copa (imagen: borde superior claro)
    ctx.fillStyle=lerpColor('#4a6838','#404020',1-v);
    for(let px=-a.r1+2;px<=a.r1-2;px++)
      ctx.fillRect(Math.floor(bx+px+bal),Math.floor(n-alt+1),1,1);
  });
}

// ── Ribera / lodo / hierba (imagen: tierra marrón cálida) ────
function dibRibera(t){
  const n=na(), w=W.mundoAncho;  // mundo completo
  const tierraH=8+W.etapaIdx*5;
  const v=W.vitalidad;

  // Lodo base
  ctx.fillStyle=W.contam>.5?'#3a2c14':'#3a2e18';
  ctx.fillRect(0,n-tierraH,w,tierraH);

  // Segunda capa (más oscura)
  ctx.fillStyle=W.contam>.5?'#2e2410':'#302814';
  ctx.fillRect(0,n-2,w,2);

  // Hierba ribereña (pixel, pequeños brotes)
  for(let gx=0;gx<w;gx+=3){
    const gh=2+Math.floor(Math.sin(gx*.15+t*.26)*2);
    const gc=lerpColor('#3a5228','#403a18',1-v);
    ctx.fillStyle=gc;
    ctx.fillRect(gx,n-tierraH-gh,2,gh);
    // Variación de color cada ciertos px
    if(gx%9===0){
      ctx.fillStyle=lerpColor('#2e4020','#343010',1-v);
      ctx.fillRect(gx+1,n-tierraH-gh-1,1,gh+1);
    }
  }

  // Cemento (contaminación)
  if(W.contam>.45){
    const a=(W.contam-.45)*1.8;
    ctx.fillStyle=`rgba(80,76,70,${a*.3})`;
    for(let i=0;i<6;i++) ctx.fillRect(w*(.03+i*.16),n-tierraH-(8+i*3),54+i*13,8+i*3);
  }
}

// ── Tronco caído en agua ────────────────────────────────────
function dibTroncos(){
  const n=na();
  W.troncos.forEach(tr=>{
    const ty=n-3;
    // Tronco principal (marrón verde oscuro)
    ctx.fillStyle='#3a2c18'; ctx.fillRect(tr.x,ty,tr.largo,tr.grosor);
    ctx.fillStyle='#2e2414'; ctx.fillRect(tr.x,ty+1,tr.largo,2);
    // Musgo encima
    ctx.fillStyle='#2a3818'; ctx.fillRect(tr.x+4,ty,tr.largo-8,2);
    // Extremos redondeados pixel
    ctx.fillStyle='#3a2c18';
    ctx.fillRect(tr.x-2,ty+1,2,tr.grosor-2);
    ctx.fillRect(tr.x+tr.largo,ty+1,2,tr.grosor-2);
  });
}

// ── Agua — color referencia: verde-gris oscuro profundo ──────
function dibAgua(t){
  const n=na(), w=W.mundoAncho, h=W.h, v=W.vitalidad;

  const topC=lerpColor('#2e3e32','#1a1808',1-v);
  const botC=lerpColor('#101810','#080a04',1-v);
  const gA=ctx.createLinearGradient(0,n,0,h);
  gA.addColorStop(0,topC); gA.addColorStop(1,botC);
  ctx.fillStyle=gA; ctx.fillRect(0,n,w,h-n);

  // Olas superficie pixel
  const supC=lerpColor('rgba(75,110,85,.28)','rgba(60,55,20,.22)',1-v);
  ctx.fillStyle=supC;
  for(let x=0;x<w;x+=2){
    let oy=n;
    W.olas.forEach(o=>{ oy+=Math.sin((x/w)*Math.PI*8+t*o.vel+o.off)*o.amp*(1-W.contam*.35); });
    ctx.fillRect(x,Math.floor(oy)-1,2,3);
  }

  // Reflejos de luz (imagen: brillos suaves horizontales)
  if(W.contam<.48){
    const ra=v*.07;
    ctx.fillStyle=`rgba(80,115,90,${ra})`;
    for(let r=0;r<5;r++){
      const ry=n+18+r*32+Math.sin(t*.4+r)*10;
      const rx=Math.sin(t*.22+r*1.2)*68+w*.25;
      ctx.fillRect(rx,ry,32+Math.sin(t+r)*15,2);
    }
  }

  // Barro del fondo
  const by=h-16;
  ctx.fillStyle=W.contam>.5?'#181008':'#101610';
  ctx.fillRect(0,by,w,16);
  ctx.fillStyle=W.contam>.5?'#201a0c':'#182010';
  for(let pi=0;pi<w;pi+=10) ctx.fillRect(pi+Math.floor(Math.sin(pi)*3),by+2,3,3);
}

// ── Totoras / espadañas (imagen: oscuras, verticales, cabeza marrón) ──
function dibTotoras(t){
  const n=na();
  W.juncos.forEach(j=>{
    const bal=Math.sin(t*.48+j.fase)*5;
    if(j.esTotora){
      // Totora: tallo muy oscuro, cabeza ovalada marrón
      ctx.fillStyle=W.contam>.5?'#282c14':'#1a1e10';
      for(let sy=0;sy<j.h;sy+=2)
        ctx.fillRect(Math.floor(j.x+bal*(sy/j.h)),Math.floor(n-sy),j.g,2);
      // Cabeza de totora (ovalada pixel)
      const hx=Math.floor(j.x+bal), hy=Math.floor(n-j.h-10);
      ctx.fillStyle=W.contam>.5?'#504020':'#3a2818';
      ctx.fillRect(hx-1,hy,3,10); ctx.fillRect(hx,hy-1,1,12);
      ctx.fillRect(hx-2,hy+2,5,6);
    } else {
      // Junco simple: tallo fino
      ctx.fillStyle=W.contam>.5?'#484a20':'#222a14';
      for(let sy=0;sy<j.h;sy+=2)
        ctx.fillRect(Math.floor(j.x+bal*(sy/j.h)),Math.floor(n-sy),1,2);
      // Punta
      const hx=Math.floor(j.x+bal),hy=Math.floor(n-j.h-4);
      ctx.fillStyle=W.contam>.5?'#585820':'#2e3818';
      ctx.fillRect(hx,hy,1,4);
    }
  });
}

// ── Algas subacuáticas ───────────────────────────────────────
function dibAlgas(t){
  const brillo=W.algasBrillo;
  W.algas.forEach(a=>{
    const bal=Math.sin(t*.65+a.fase)*7;
    const c1=a.contam?'#586a15':'#1e4a20';
    const c2=a.contam?'#728820':'#2a6028';
    const segH=a.h/a.segs;
    for(let s=0;s<a.segs;s++){
      const sy=a.yBase-s*segH, sx=a.x+bal*((s+1)/a.segs);
      ctx.fillStyle=brillo>1?(s%2===0?'#2a6030':'#38782e'):(s%2===0?c1:c2);
      ctx.fillRect(Math.floor(sx)-1,Math.floor(sy-segH),3,Math.floor(segH)-1);
    }
    // Hoja lateral
    const lx=Math.floor(a.x+bal*.7),ly=Math.floor(a.yBase-a.h*.5);
    ctx.fillStyle=a.contam?'#728820':'#2a6028';
    ctx.fillRect(lx,ly,6,2); ctx.fillRect(lx+1,ly-1,4,1);
  });
}

// ── Camalotes / lirios (imagen: hojas redondas bien definidas) ──
function dibCamalotes(t){
  const v=W.vitalidad;
  W.camalotes.forEach(c=>{
    const bob=Math.sin(t*.52+c.x*.01)*2;
    const cy=Math.floor(c.y+bob), cr=Math.floor(c.r);
    const c1=lerpColor('#3a6020','#484010',1-v);
    const c2=lerpColor('#4e7828','#585018',1-v);
    const c3=lerpColor('#2a4a18','#363010',1-v);
    // Hoja principal (círculo pixel)
    for(let py=-cr;py<=cr;py++) for(let px=-cr;px<=cr;px++){
      if(px*px+py*py<=cr*cr){
        const d=Math.sqrt(px*px+py*py)/cr;
        ctx.fillStyle=d<.5?c2:d<.8?c1:c3;
        ctx.fillRect(Math.floor(c.x)+px,cy+py,1,1);
      }
    }
    // Nervadura central
    ctx.fillStyle=lerpColor('#2a4818','#303010',1-v);
    ctx.fillRect(Math.floor(c.x)-1,cy-cr+2,2,cr*2-4);
    ctx.fillRect(Math.floor(c.x)-cr+3,cy-1,cr*2-6,2);
    // Ranura característica del lirio
    ctx.fillStyle=lerpColor('#2e3e18','#282808',1-v);
    ctx.fillRect(Math.floor(c.x),cy-cr,1,4);

    // Flor (imagen: pequeñas flores blancas en algunos lirios)
    if(c.tieneFlor&&W.contam<.4&&v>.5){
      ctx.fillStyle='#d8dca8'; ctx.fillRect(Math.floor(c.x)-1,cy-cr-4,3,3);
      ctx.fillStyle='#e8ecb8'; ctx.fillRect(Math.floor(c.x),cy-cr-5,1,2);
      ctx.fillStyle='#f0e898'; ctx.fillRect(Math.floor(c.x),cy-cr-3,1,1);
    }
  });
}

// ── Peces ────────────────────────────────────────────────────
function dibPeces(){
  if(W.etapaIdx>2) return;
  W.peces.forEach(p=>{
    const d=p.vel>0?1:-1, px=Math.floor(p.x), py=Math.floor(p.y);
    const alerta=Math.abs(p.x-O.x)<80&&Math.abs(p.y-O.y)<55;
    ctx.fillStyle=alerta?'#c02c0e':'#4a2810';
    ctx.fillRect(px-7*d,py-3,12,6);
    ctx.fillRect(px+(7-2)*d,py-4,4,4); ctx.fillRect(px+(7-2)*d,py+1,4,4);
    ctx.fillStyle='#d8c870'; ctx.fillRect(px-5*d,py-1,2,2);
  });
}

// ── Insectos ─────────────────────────────────────────────────
function dibInsectos(){
  if(!W.insectos) return;
  W.insectos.forEach(ins=>{
    const ix=Math.floor(ins.x),iy=Math.floor(ins.y);
    ctx.fillStyle=`rgba(152,85,35,${ins.vida*.8})`; ctx.fillRect(ix-2,iy-2,4,4);
    ctx.fillStyle=`rgba(200,162,72,${ins.vida*.4})`; ctx.fillRect(ix-5,iy-2,3,2); ctx.fillRect(ix+2,iy-2,3,2);
  });
}

// ── Ondas de canto ───────────────────────────────────────────
function dibOndas(){
  W.ondas.forEach(o=>{
    const sil=W.silencioEco>.1;
    ctx.strokeStyle=sil?`rgba(80,80,60,${o.alpha*.3})`:`rgba(130,212,104,${o.alpha})`;
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(o.x,o.y,Math.floor(o.r),0,Math.PI*2); ctx.stroke();
  });
}

// ── Partículas ───────────────────────────────────────────────
function dibParticulas(){
  W.particulas.forEach(p=>{
    ctx.fillStyle=`rgba(${p.cr},${p.cg},${p.cb},${p.vida*.72})`;
    ctx.fillRect(Math.floor(p.x),Math.floor(p.y),Math.ceil(p.r),Math.ceil(p.r));
  });
}

// ── Organismo (pixel art por etapa) ──────────────────────────
function dibOrganismo(t){
  if(W.enTransicion) return;
  const x=Math.floor(O.x),y=Math.floor(O.y),d=O.dir;
  const mal=O.malformacion,hum=O.humedad;
  const rv=mal>.5?125+Math.floor(Math.sin(t*4)*13):Math.floor(46+(1-hum)*75);
  const gv=mal>.5?100:Math.floor(136-(1-hum)*64);
  const bv=mal>.5?34:Math.floor(40+(1-hum)*13);
  const col=`rgb(${rv},${gv},${bv})`;
  const colC=`rgb(${Math.min(255,rv+35)},${Math.min(255,gv+45)},${Math.min(255,bv+15)})`;

  switch(W.etapaIdx){
    case 0: dibHuevoOrg(x,y,t);             break;
    case 1: dibRenacuajoOrg(x,y,t,col,colC,d); break;
    case 2: dibTransOrg(x,y,t,col,colC,d,mal); break;
    case 3: case 4: dibRanaOrg(x,y,t,col,colC,d,mal); break;
  }
  if(O.cantando&&W.etapaIdx>=4){
    ctx.fillStyle='rgba(140,225,98,.65)'; ctx.fillRect(x+d*13,y-9,4,4);
  }
}

function dibHuevoOrg(x,y,t){
  const b=Math.sin(t*.5)|0;
  ctx.fillStyle='rgba(75,155,135,.32)'; ctx.fillRect(x-9,y-7+b,18,14); ctx.fillRect(x-8,y-8+b,16,16);
  ctx.fillStyle='#2c5c44'; ctx.fillRect(x-5,y-4+b,10,9);
  ctx.fillStyle='#1c3c2c'; ctx.fillRect(x-3,y-2+b,6,5);
  if(Math.floor(t*2)%2===0){ ctx.fillStyle='rgba(92,192,145,.16)'; ctx.fillRect(x-11,y-9+b,22,18); }
}

function dibRenacuajoOrg(x,y,t,col,colC,d){
  const ond=Math.sin(t*7+O.animT)*6;
  ctx.fillStyle=col;
  for(let s=1;s<=6;s++){
    const sw=Math.max(1,4-Math.floor(s/2));
    ctx.fillRect(Math.floor(x-d*s*5)-Math.floor(sw/2),Math.floor(y+ond*(s/6))-2,sw,4);
  }
  ctx.fillStyle=col; ctx.fillRect(x-6,y-4,12,9); ctx.fillRect(x-5,y-5,10,11);
  ctx.fillStyle=colC; ctx.fillRect(x-4,y-3,8,7);
  ctx.fillStyle='#b85858'; ctx.fillRect(x-7,y-1,2,3); ctx.fillRect(x+5,y-1,2,3);
  ctx.fillStyle='#180a00'; ctx.fillRect(x+d*3,y-3,3,3);
  ctx.fillStyle='rgba(255,255,255,.48)'; ctx.fillRect(x+d*3+1,y-3,1,1);
}

function dibTransOrg(x,y,t,col,colC,d,mal){
  const ond=Math.sin(t*5)*3;
  ctx.fillStyle=col;
  for(let s=1;s<=3;s++) ctx.fillRect(Math.floor(x-d*s*4),Math.floor(y+ond*(s/3)),4-s,4);
  ctx.fillStyle=col; ctx.fillRect(x-7,y-5,14,11); ctx.fillRect(x-6,y-6,12,13);
  ctx.fillStyle=colC; ctx.fillRect(x-5,y-4,10,9);
  const pL=mal>.5?4:8;
  ctx.fillStyle=col; ctx.fillRect(x-8,y+4,pL,3); ctx.fillRect(x+8-pL,y+4,pL,3);
  ctx.fillRect(x-d*6,y,3,2);
  ctx.fillStyle='#180a00'; ctx.fillRect(x+d*4,y-4,3,3);
  ctx.fillStyle='rgba(255,255,255,.48)'; ctx.fillRect(x+d*5,y-4,1,1);
}

function dibRanaOrg(x,y,t,col,colC,d,mal){
  const s=O.tam;
  ctx.fillStyle='rgba(0,0,0,.16)'; ctx.fillRect(x-s+2,y+s-1,s*2-4,3);
  const pa=O.saltando?-3:Math.sin(t*5)*2;
  ctx.fillStyle=col;
  ctx.fillRect(x-s-4,y+pa,5,3); ctx.fillRect(x-s-6,y+3+pa,7,2);
  ctx.fillRect(x+s-1,y+pa,5,3); ctx.fillRect(x+s-1,y+3+pa,7,2);
  ctx.fillRect(x-s+1,y+s-4,3,3); ctx.fillRect(x-s-1,y+s-2,4,2);
  ctx.fillRect(x+s-4,y+s-4,3,3); ctx.fillRect(x+s-3,y+s-2,4,2);
  ctx.fillStyle=col;
  ctx.fillRect(x-s+2,y-s+2,s*2-4,s*2-4); ctx.fillRect(x-s,y-s+4,s*2,s*2-8);
  ctx.fillRect(x-s+4,y-s,s*2-8,s*2);
  ctx.fillStyle=colC; ctx.fillRect(x-s+4,y-s+3,s*2-8,s*2-8);
  if(mal<.4){
    ctx.fillStyle='rgba(35,65,20,.44)';
    [[2,-2],[-3,1],[3,2]].forEach(([mx,my])=>ctx.fillRect(x+mx*2,y+my*2,3,3));
  } else {
    for(let i=0;i<5;i++){
      ctx.fillStyle=`rgba(172,122,24,${.34+Math.sin(t+i)*.18})`;
      ctx.fillRect(x+Math.floor(Math.sin(i*1.7+t)*s*.58),y+Math.floor(Math.cos(i*2.3)*s*.38),3,3);
    }
  }
  [-1,1].forEach(l=>{
    const ox=x+l*(s-4),oy=y-s+2;
    ctx.fillStyle='#182008'; ctx.fillRect(ox-2,oy-2,6,6);
    ctx.fillStyle='#080200'; ctx.fillRect(ox-1,oy-1,4,4);
    ctx.fillStyle='rgba(255,255,255,.52)'; ctx.fillRect(ox,oy-1,2,2);
  });
  if(O.estivacion){ ctx.fillStyle='rgba(75,55,16,.56)'; ctx.fillRect(x-s,y+s-4,s*2,4); }
}

/* ============================================================
   BARRA DE PROGRESO (sutil)
============================================================ */
function dibProgreso(){
  if(W.etapaIdx>=4) return;
  const pw=Math.floor(W.w*.16*W.progreso);
  ctx.fillStyle='rgba(55,125,75,.12)'; ctx.fillRect(12,W.h-11,Math.floor(W.w*.16),3);
  ctx.fillStyle='rgba(85,185,118,.38)'; ctx.fillRect(12,W.h-11,pw,3);
}

/* ============================================================
   HELPER: interpolación de color hex/rgba
============================================================ */
function lerpColor(a,b,t){
  // Interpolación básica entre dos colores hex 6 dígitos
  // Si es rgba, devuelve el primero (simplificación)
  if(a.startsWith('rgba')) return a;
  const pa=parseInt,r1=pa(a.slice(1,3),16),g1=pa(a.slice(3,5),16),b1=pa(a.slice(5,7),16);
  const r2=pa(b.slice(1,3),16),g2=pa(b.slice(3,5),16),b2=pa(b.slice(5,7),16);
  const r=Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), bl=Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${bl})`;
}

/* ============================================================
   DIBUJAR SÍMBOLOS DE PREGUNTA
   Pixel art: un ícono flotante pulsante en coordenadas de mundo.
   Forma: círculo con signo "?" interno.
   Solo visible si corresponde a la etapa actual y no fue recogido.
============================================================ */
function dibSimbolos(t){
  const n=na();
  W.simbolos.forEach(s=>{
    if(s.recogido) return;
    if(s.etapa!==W.etapaIdx) return;

    // El símbolo flota sobre la superficie (agua o ribera)
    const sy = n - 30 - Math.sin(s.pulso)* 5;
    const sx = Math.floor(s.x);

    // Halo exterior pulsante
    const haloR = 14 + Math.sin(s.pulso)* 3;
    ctx.strokeStyle = `rgba(180,240,160,${.25+Math.sin(s.pulso)*.15})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sx,sy,haloR,0,Math.PI*2); ctx.stroke();

    // Cuerpo del símbolo — círculo sólido pixel
    ctx.fillStyle = '#0e2018';
    for(let py=-10;py<=10;py++) for(let px=-10;px<=10;px++)
      if(px*px+py*py<=100) ctx.fillRect(sx+px,Math.floor(sy)+py,1,1);

    // Borde verde
    ctx.strokeStyle = `rgba(100,210,120,${.7+Math.sin(s.pulso)*.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sx,sy,10,0,Math.PI*2); ctx.stroke();

    // "?" pixel art centrado
    ctx.fillStyle = `rgba(140,230,120,${.85+Math.sin(s.pulso)*.1})`;
    // Trazo superior del ?
    ctx.fillRect(sx-3,Math.floor(sy)-6,6,2);
    ctx.fillRect(sx+1,Math.floor(sy)-6,2,5);
    ctx.fillRect(sx-2,Math.floor(sy)-2,4,2);
    // Punto del ?
    ctx.fillRect(sx-1,Math.floor(sy)+3,2,2);

    // Etiqueta pequeña debajo
    ctx.fillStyle='rgba(120,200,110,.55)';
    ctx.fillRect(sx-12,Math.floor(sy)+14,24,5);
    ctx.fillStyle='rgba(8,20,12,.8)';
    ctx.fillRect(sx-11,Math.floor(sy)+15,22,3);
  });
}

/* ============================================================
   DIBUJAR ALIMENTOS (fase post-respuesta correcta)
   Tipos: alga (verde), insecto (ámbar), gota (azul)
   Pixel art pulsante, coordenadas de mundo
============================================================ */
function dibAlimentos(t){
  if(!W.faseAlimentacion) return;
  W.alimentos.forEach(a=>{
    if(a.recogido) return;
    const ax=Math.floor(a.x), ay=Math.floor(a.y);
    const p=a.pulso+t*2;
    const br=.7+Math.sin(p)*.25;

    if(a.tipo==='alga'){
      // Pelota de alga: círculo verde brillante con brillo
      ctx.fillStyle=`rgba(48,168,80,${br})`;
      for(let py=-5;py<=5;py++) for(let px=-5;px<=5;px++)
        if(px*px+py*py<=25) ctx.fillRect(ax+px,ay+py,1,1);
      ctx.fillStyle=`rgba(100,220,120,${br*.6})`;
      ctx.fillRect(ax-2,ay-3,2,2);
    } else if(a.tipo==='insecto'){
      // Insecto: cuerpo ámbar + alas
      ctx.fillStyle=`rgba(210,160,40,${br})`;
      ctx.fillRect(ax-3,ay-3,6,6);
      ctx.fillStyle=`rgba(230,200,80,${br*.5})`;
      ctx.fillRect(ax-6,ay-3,3,2); ctx.fillRect(ax+3,ay-3,3,2);
      ctx.fillRect(ax-5,ay,3,2);   ctx.fillRect(ax+2,ay,3,2);
    } else {
      // Gota de agua: azul-verde
      ctx.fillStyle=`rgba(80,180,210,${br})`;
      ctx.fillRect(ax-2,ay-5,4,2);
      ctx.fillRect(ax-3,ay-3,6,4);
      ctx.fillRect(ax-4,ay+1,8,3);
      ctx.fillRect(ax-2,ay+4,4,2);
      ctx.fillStyle=`rgba(160,230,240,${br*.5})`;
      ctx.fillRect(ax-1,ay-2,1,2);
    }

    // Halo de atracción
    ctx.strokeStyle=`rgba(180,240,160,${.2+Math.sin(p)*.15})`;
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.arc(ax,ay,8+Math.sin(p)*2,0,Math.PI*2);
    ctx.stroke();
  });
}

/* ============================================================
   LOOP PRINCIPAL
   NUEVO: aplica transform de cámara antes de dibujar el mundo
============================================================ */
let tAnt=null;
function loop(ts){
  if(!tAnt) tAnt=ts;
  const dt=Math.min((ts-tAnt)/1000,.05); tAnt=ts;
  const t=ts/1000;
  O.animT+=dt*6;
  // Actualizar pulso de símbolos
  W.simbolos.forEach(s=>{ s.pulso=(s.pulso||0)+dt*3; });

  ctx.clearRect(0,0,W.w,W.h);

  // ── NUEVO: CÁMARA — desplazar el mundo según camX ────────────
  ctx.save();
  ctx.translate(-Math.round(W.camX), 0);

  // Orden de capas fiel a la imagen referencia:
  dibCielo(t);      // cielo (usa coordenadas extendidas)
  dibArboles(t);
  dibRibera(t);
  dibTroncos();
  dibAgua(t);
  dibAlgas(t);
  dibCamalotes(t);
  dibTotoras(t);
  dibSimbolos(t);   // ── NUEVO: símbolos de pregunta
  dibAlimentos(t);  // ── NUEVO: alimentos de fase post-respuesta
  dibPeces();
  dibParticulas();
  dibOndas();
  dibInsectos();
  dibOrganismo(t);

  ctx.restore();    // fin de la transformación de cámara

  // Barra de progreso (coordenadas de pantalla, fuera del scroll)
  dibProgreso();

  actualizar(dt);
  requestAnimationFrame(loop);
}

/* ============================================================
   ARRANQUE
============================================================ */
$('btn-iniciar').addEventListener('click',()=>{
  const ini=$('inicio'); ini.classList.add('oculto');
  setTimeout(()=>{
    ini.style.display='none';

    etapaNomEl.textContent=ETAPAS[0].nombre;
    mostrarMensaje("Tu historia comienza en la quietud de esa matriz líquida. Sos el principio.",9000);
    setTimeout(()=>requestAnimationFrame(loop),500);
  },1900);
});
